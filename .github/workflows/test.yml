name: Tests

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    # macOS coverage is best-effort until community validation — failures are visible but non-blocking
    continue-on-error: ${{ matrix.os == 'macos-latest' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Cache HuggingFace model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-all-MiniLM-L6-v2-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            hf-all-MiniLM-L6-v2-${{ runner.os }}-

      - name: Configure git for tests (Windows)
        if: runner.os == 'Windows'
        run: |
          git config --global core.autocrlf false
          git config --global init.defaultBranch main
          git config --global --add safe.directory '*'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
        env:
          # Suppress any .env files from bleeding into CI
          SCRYBE_RERANK: "false"
          # Explicit cache dir so all platforms write to the same path
          HF_HOME: ~/.cache/huggingface
