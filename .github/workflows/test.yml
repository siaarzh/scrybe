name: Tests

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}

    env:
      # Suppress any .env files from bleeding into CI.
      SCRYBE_RERANK: "false"
      NO_UPDATE_NOTIFIER: "1"
      # Pin all local HF model weights to one stable, cacheable directory shared by
      # every step and every spawned CLI / sidecar (scenario tests use per-test temp
      # DATA_DIRs, so DATA_DIR/models can't be cached). getTransformers() honors this.
      SCRYBE_MODEL_CACHE_DIR: ${{ github.workspace }}/.model-cache

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Cache local model weights
        uses: actions/cache@v5
        with:
          # Must match SCRYBE_MODEL_CACHE_DIR. Covers both models scrybe loads:
          # Xenova/multilingual-e5-small (embedder) + Xenova/ms-marco-MiniLM-L-6-v2 (reranker).
          path: ${{ github.workspace }}/.model-cache
          key: scrybe-models-e5small-minilm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            scrybe-models-e5small-minilm-${{ runner.os }}-

      - name: Configure git for tests (Windows)
        if: runner.os == 'Windows'
        run: |
          git config --global core.autocrlf false
          git config --global init.defaultBranch main
          git config --global --add safe.directory '*'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Scenario tests
        run: npm run test:scenarios
