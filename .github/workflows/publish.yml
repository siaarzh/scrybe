name: Publish to npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # write: needed for `gh release create`
      id-token: write   # required for --provenance attestation

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22.x"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - run: npm run build

      - run: npm test

      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release from CHANGELOG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          # Extract the section between "## [<version>] — DATE" and the next "## ["
          notes=$(awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" { capture=1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md | sed -e 's/^---$//' | awk 'NF || prev_blank == 0 { print; prev_blank = !NF }')
          if [ -z "$(echo "$notes" | tr -d '[:space:]')" ]; then
            echo "No CHANGELOG entry for $TAG; falling back to --generate-notes."
            gh release create "$TAG" --title "$TAG" --generate-notes
          else
            gh release create "$TAG" --title "$TAG" --notes "$notes"
          fi
